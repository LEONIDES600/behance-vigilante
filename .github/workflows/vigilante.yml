name: Vigilante Behance

on:
  schedule:
    - cron: '*/10 * * * *'   # cada ~10 minutos (GitHub puede retrasarlo unos minutos)
  workflow_dispatch:           # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: vigilante
  cancel-in-progress: false

jobs:
  revisar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restaurar estado (ofertas ya vistas)
        uses: actions/cache/restore@v4
        with:
          path: estado
          key: seen-${{ github.run_id }}
          restore-keys: |
            seen-

      - name: Revisar plataformas
        run: node vigilante.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Guardar estado
        if: always()
        uses: actions/cache/save@v4
        with:
          path: estado
          key: seen-${{ github.run_id }}

  # GitHub pausa los crons en repositorios sin actividad durante 60 días.
  # Este trabajo hace un commit vacío semanal para mantenerlo vivo.
  keepalive:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Commit semanal de actividad
        run: |
          last=$(git log -1 --format=%ct)
          now=$(date +%s)
          if [ $(( now - last )) -gt 518400 ]; then
            git config user.name "vigilante-bot"
            git config user.email "actions@github.com"
            git commit --allow-empty -m "keepalive: mantener el cron activo"
            git push
          else
            echo "Actividad reciente, no hace falta keepalive."
          fi
