name: Vigilante Behance

on:
  # Cron de hora en punto: GitHub dispara los crons horarios de forma mucho más
  # fiable que los de alta frecuencia (*/10), que suele despriorizar o saltarse.
  # La densidad real (revisar cada pocos minutos) la da el bucle interno del job.
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:           # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: vigilante
  cancel-in-progress: false

jobs:
  revisar:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restaurar estado (ofertas ya vistas)
        uses: actions/cache/restore@v4
        with:
          path: estado
          key: seen-${{ github.run_id }}
          restore-keys: |
            seen-

      # Una sola ejecución vigila durante ~50 min, revisando cada 3 min. Así no
      # dependemos de que el cron se dispare muchas veces por hora: con que arranque
      # una vez, cubre casi toda la hora y avisa a los pocos minutos de cada oferta.
      - name: Revisar Behance en bucle (~50 min, cada 3 min)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for i in $(seq 1 17); do
            echo "── Pasada $i de 17 ($(date -u +%H:%M:%S) UTC) ──"
            node vigilante.js || echo "Pasada $i fallida; se reintenta en la siguiente."
            if [ "$i" -lt 17 ]; then sleep 180; fi
          done

      - name: Guardar estado
        if: always()
        uses: actions/cache/save@v4
        with:
          path: estado
          key: seen-${{ github.run_id }}

  # GitHub pausa los crons en repositorios sin actividad durante 60 días.
  # Este trabajo hace un commit vacío semanal para mantenerlo vivo.
  keepalive:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Commit semanal de actividad
        run: |
          last=$(git log -1 --format=%ct)
          now=$(date +%s)
          if [ $(( now - last )) -gt 518400 ]; then
            git config user.name "vigilante-bot"
            git config user.email "actions@github.com"
            git commit --allow-empty -m "keepalive: mantener el cron activo"
            git push
          else
            echo "Actividad reciente, no hace falta keepalive."
          fi
