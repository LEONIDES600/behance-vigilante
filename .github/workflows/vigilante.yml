name: Vigilante Behance

on:
  # Cron de hora en punto: solo sirve para (re)arrancar la vigilancia. Como cada
  # ejecución vigila en bucle ~5,5 h, basta con que GitHub dispare el cron unas
  # pocas veces al día para tener cobertura casi continua. Los crons horarios son
  # mucho más fiables que los de alta frecuencia (*/10), que GitHub suele saltarse,
  # y 'concurrency' garantiza que nunca haya dos ejecuciones a la vez.
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:           # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: vigilante
  cancel-in-progress: false

jobs:
  revisar:
    runs-on: ubuntu-latest
    timeout-minutes: 345
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restaurar estado (ofertas ya vistas)
        uses: actions/cache/restore@v4
        with:
          path: estado
          key: seen-${{ github.run_id }}
          restore-keys: |
            seen-

      # Una sola ejecución vigila durante ~5,5 h, revisando cada 3 min. Así basta
      # con que el cron arranque unas pocas veces al día para cubrir el día casi
      # entero, y avisa a los pocos minutos de cada nueva oferta. La protección de
      # 'concurrency' evita que se solapen o acumulen ejecuciones.
      - name: Revisar Behance en bucle (~5,5 h, cada 3 min)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          fin=$(( $(date +%s) + 19800 ))   # vigilar durante 5 h 30 min
          i=0
          while [ "$(date +%s)" -lt "$fin" ]; do
            i=$((i+1))
            echo "── Pasada $i ($(date -u +%H:%M:%S) UTC) ──"
            node vigilante.js || echo "Pasada $i fallida; se reintenta en la siguiente."
            sleep 180
          done
          echo "Fin del ciclo de vigilancia tras $i pasadas."

      - name: Guardar estado
        if: always()
        uses: actions/cache/save@v4
        with:
          path: estado
          key: seen-${{ github.run_id }}

  # GitHub pausa los crons en repositorios sin actividad durante 60 días.
  # Este trabajo hace un commit vacío semanal para mantenerlo vivo.
  keepalive:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Commit semanal de actividad
        run: |
          last=$(git log -1 --format=%ct)
          now=$(date +%s)
          if [ $(( now - last )) -gt 518400 ]; then
            git config user.name "vigilante-bot"
            git config user.email "actions@github.com"
            git commit --allow-empty -m "keepalive: mantener el cron activo"
            git push
          else
            echo "Actividad reciente, no hace falta keepalive."
          fi
