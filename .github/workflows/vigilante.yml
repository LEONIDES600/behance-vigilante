name: Vigilante Behance

on:
  # Respaldo: con el secreto DISPATCH_PAT, el workflow se reencadena solo (ver el
  # paso final), así que NO depende del cron. Este cron cada 6 h es solo una red de
  # seguridad por si la cadena se rompiera alguna vez (p. ej. runner desalojado).
  schedule:
    - cron: '7 */6 * * *'
  workflow_dispatch:           # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: vigilante
  cancel-in-progress: false

jobs:
  revisar:
    runs-on: ubuntu-latest
    timeout-minutes: 345
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restaurar estado (ofertas ya vistas)
        uses: actions/cache/restore@v4
        with:
          path: estado
          key: seen-${{ github.run_id }}
          restore-keys: |
            seen-

      # Una sola ejecución vigila durante ~5,5 h, revisando cada 3 min. Así basta
      # con que el cron arranque unas pocas veces al día para cubrir el día casi
      # entero, y avisa a los pocos minutos de cada nueva oferta. La protección de
      # 'concurrency' evita que se solapen o acumulen ejecuciones.
      - name: Revisar Behance en bucle (~5,5 h, cada 3 min)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          fin=$(( $(date +%s) + 19800 ))   # vigilar durante 5 h 30 min
          i=0
          while [ "$(date +%s)" -lt "$fin" ]; do
            i=$((i+1))
            echo "── Pasada $i ($(date -u +%H:%M:%S) UTC) ──"
            node vigilante.js || echo "Pasada $i fallida; se reintenta en la siguiente."
            sleep 180
          done
          echo "Fin del ciclo de vigilancia tras $i pasadas."

      - name: Guardar estado
        if: always()
        uses: actions/cache/save@v4
        with:
          path: estado
          key: seen-${{ github.run_id }}

      # Auto-encadenado: al terminar el ciclo, el workflow se lanza a sí mismo para
      # que la vigilancia sea continua sin depender del cron de GitHub. Usa un token
      # personal (secreto DISPATCH_PAT) porque el GITHUB_TOKEN por defecto NO puede
      # disparar nuevos workflows (GitHub lo bloquea para evitar bucles). Se ejecuta
      # tras guardar el estado, de modo que la siguiente ejecución parte de los IDs
      # ya vistos. Si el secreto no existe, no hace nada y se depende del cron.
      - name: Encadenar la siguiente vigilancia
        if: success()
        env:
          GH_PAT: ${{ secrets.DISPATCH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "Sin DISPATCH_PAT: no se reencadena (la red de seguridad es el cron)."
            echo "Añade el secreto DISPATCH_PAT para vigilancia continua a prueba de balas."
            exit 0
          fi
          code=$(curl -sS -o /tmp/resp.txt -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/vigilante.yml/dispatches" \
            -d '{"ref":"main"}')
          if [ "$code" = "204" ]; then
            echo "Siguiente vigilancia encadenada correctamente."
          else
            echo "No se pudo reencadenar (HTTP $code): $(cat /tmp/resp.txt). El cron lo retomará."
          fi

  # GitHub pausa los crons en repositorios sin actividad durante 60 días.
  # Este trabajo hace un commit vacío semanal para mantenerlo vivo.
  keepalive:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Commit semanal de actividad
        run: |
          last=$(git log -1 --format=%ct)
          now=$(date +%s)
          if [ $(( now - last )) -gt 518400 ]; then
            git config user.name "vigilante-bot"
            git config user.email "actions@github.com"
            git commit --allow-empty -m "keepalive: mantener el cron activo"
            git push
          else
            echo "Actividad reciente, no hace falta keepalive."
          fi
